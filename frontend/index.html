<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0E1116" />
    <meta name="description" content="Founder Companion — an AI co-founder for first-generation founders." />
    <title>Founder Companion</title>

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- iOS "installed app" behavior: standalone window, no Safari chrome,
         dark status bar to match the theme, so it behaves like a native
         app when added to the home screen (Android gets this from the
         web app manifest injected by vite-plugin-pwa automatically). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Founder Companion" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
      /* Matches the app background so there's no white flash before React
         mounts (a big part of feeling "native" instead of "a website"). */
      html, body, #root { height: 100%; margin: 0; background: #0E1116; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
